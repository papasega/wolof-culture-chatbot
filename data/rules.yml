version: "3.1"

rules:

# --- BASIQUES ---
- rule: Salutation
  steps:
    - intent: greet
    - action: utter_greet

- rule: Au revoir
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Remerciement
  steps:
    - intent: thank_you
    - action: utter_thank_you

- rule: Bot challenge
  steps:
    - intent: bot_challenge
    - action: utter_iamabot

- rule: OK confirmation
  steps:
    - intent: ok
    - action: utter_ok

# --- FAQ ---
- rule: Répondre aux FAQ
  steps:
    - intent: faq
    - action: utter_faq

- rule: Répondre aux FAQ2
  steps:
    - intent: faq2
    - action: utter_faq2

# --- CHITCHAT ---
- rule: Répondre au chitchat
  steps:
    - intent: chitchat
